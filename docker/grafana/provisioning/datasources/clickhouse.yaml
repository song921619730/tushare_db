apiVersion: 1

datasources:
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    access: proxy
    isDefault: true
    url: http://clickhouse:8123
    jsonData:
      defaultDatabase: tushare
      port: 8123
      protocol: http
      server: clickhouse
      tlsSkipVerify: true
    secureJsonData:
      username: grafana
      password: ${CH_GRAFANA_PASSWORD}
