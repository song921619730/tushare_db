services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    restart: unless-stopped
    ports: ["8123:8123", "9000:9000"]
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./docker/clickhouse/config.xml:/etc/clickhouse-server/config.d/00-custom.xml:ro
      - ./docker/clickhouse/users.xml:/etc/clickhouse-server/users.d/00-users.xml:ro
      - ./docker/clickhouse/init:/docker-entrypoint-initdb.d
    environment:
      CH_PIPELINE_PASSWORD: ${CH_PIPELINE_PASSWORD}
      CH_AI_READER_PASSWORD: ${CH_AI_READER_PASSWORD}
      CH_GRAFANA_PASSWORD: ${CH_GRAFANA_PASSWORD}
    deploy:
      resources:
        limits: {memory: 12G}
    command: >
      bash -c "
        sed -i \"s/PLACEHOLDER_PASSWORD/${CH_AI_READER_PASSWORD}/g\" /docker-entrypoint-initdb.d/002_create_ai_reader.sql
        /entrypoint.sh &
        until clickhouse-client --query 'SELECT 1' 2>/dev/null; do sleep 1; done
        clickhouse-client --multiquery < /docker-entrypoint-initdb.d/002_create_ai_reader.sql
        wait
      "
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 -O /dev/null http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  # pipeline-scheduler removed — replaced by system cron + daily-incremental.sh

  pipeline-mcp:
    build:
      context: .
      dockerfile: docker/pipeline/Dockerfile
    restart: unless-stopped
    ports: ["7800:7800"]
    depends_on:
      clickhouse: {condition: service_healthy}
    volumes:
      - ./config:/app/config:ro
      - ./data/logs:/app/data/logs
    environment:
      TUSHARE_TOKEN: ${TUSHARE_TOKEN}
      CH_HOST: clickhouse
      CH_PIPELINE_PASSWORD: ${CH_PIPELINE_PASSWORD}
      CH_AI_READER_PASSWORD: ${CH_AI_READER_PASSWORD}
    command: ["tushare-db", "mcp-serve", "--transport", "sse", "--host", "0.0.0.0", "--port", "7800"]

  grafana:
    image: grafana/grafana:11.0.0
    restart: unless-stopped
    ports: ["3000:3000"]
    depends_on:
      clickhouse: {condition: service_healthy}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"

  dashboard:
    build: ./dashboard
    restart: unless-stopped
    ports: ["3001:80"]
    depends_on:
      clickhouse: {condition: service_healthy}

  web:
    build: ../tushare_db_web
    restart: unless-stopped
    ports: ["8888:8888"]
    depends_on:
      clickhouse: {condition: service_healthy}
    environment:
      # jin10-mcp-proxy runs in a separate compose stack on the host's
      # published port 27891. Reach it via the host gateway so we don't
      # depend on the two stacks sharing a docker network.
      JIN10_PROXY_HOST: host.docker.internal
      JIN10_PROXY_PORT: "27891"
    extra_hosts:
      # Make `host.docker.internal` resolve to the host gateway on Linux too
      # (it works on Docker Desktop without this, but this keeps the compose
      # file portable to Linux production hosts).
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 -O /dev/null http://localhost:8888/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  clickhouse_data:
  grafana_data:
